# Input configurations
input {
    kb_layout = fr
    numlock_by_default = true
    repeat_delay = 500          # initial delay before repeat keys
    repeat_rate = 35            # typing speed

    follow_mouse = 1

    touchpad {
        natural_scroll = yes
        disable_while_typing = true
        scroll_factor = 0.5     # speed of scrolling
    }

    sensitivity = 0 # -1.0 to 1.0, 0 means no modification.
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
}