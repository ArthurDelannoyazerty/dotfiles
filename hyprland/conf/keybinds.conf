# Programs
$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun

$mainMod = SUPER

# Application shortcuts
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod, L, exec, hyprlock

# Window management
bind = $mainMod, C, killactive, 
bind = $mainMod, M, exit,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, V, togglefloating, 
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move windows left, right, up, down
bind = $mainMod SHIFT, left , movewindoworgroup, l
bind = $mainMod SHIFT, right, movewindoworgroup, r
bind = $mainMod SHIFT, down , movewindoworgroup, d
bind = $mainMod SHIFT, up   , movewindoworgroup, u

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Switch workspaces with mainMod + [0-9] (AZERTY mappings)
bind = $mainMod, code:10, workspace, 1
bind = $mainMod, code:11, workspace, 2
bind = $mainMod, code:12, workspace, 3
bind = $mainMod, code:13, workspace, 4
bind = $mainMod, code:14, workspace, 5
bind = $mainMod, code:15, workspace, 6
bind = $mainMod, code:16, workspace, 7
bind = $mainMod, code:17, workspace, 8
bind = $mainMod, code:18, workspace, 9
bind = $mainMod, code:19, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, code:10, movetoworkspace, 1
bind = $mainMod SHIFT, code:11, movetoworkspace, 2
bind = $mainMod SHIFT, code:12, movetoworkspace, 3
bind = $mainMod SHIFT, code:13, movetoworkspace, 4
bind = $mainMod SHIFT, code:14, movetoworkspace, 5
bind = $mainMod SHIFT, code:15, movetoworkspace, 6
bind = $mainMod SHIFT, code:16, movetoworkspace, 7
bind = $mainMod SHIFT, code:17, movetoworkspace, 8
bind = $mainMod SHIFT, code:18, movetoworkspace, 9
bind = $mainMod SHIFT, code:19, movetoworkspace, 10

# Special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Volume and Media Control
bind =, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%+
bind =, XF86AudioLowerVolume, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%-
bind =, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Brightness (requires brightnessctl)
bind =, XF86MonBrightnessUp, exec, brightnessctl set +5%
bind =, XF86MonBrightnessDown, exec, brightnessctl set 5%-


# --- Floating Window Manipulation ---
# Move window freely with keyboard
binde = $mainMod ALT, left,  moveactive, -40 0
binde = $mainMod ALT, right, moveactive, 40 0
binde = $mainMod ALT, up,    moveactive, 0 -40
binde = $mainMod ALT, down,  moveactive, 0 40

# Resize window freely with keyboard
binde = $mainMod SHIFT CTRL, left,  resizeactive, -40 0
binde = $mainMod SHIFT CTRL, right, resizeactive, 40 0
binde = $mainMod SHIFT CTRL, up,    resizeactive, 0 -40
binde = $mainMod SHIFT CTRL, down,  resizeactive, 0 40


bind = $mainMod ALT, P, exec, sh -c 'hyprctl activewindow | grep -qE "Picture-in-Picture|Incrustation vidéo" && hyprctl dispatch focuscurrentorlast || hyprctl dispatch focuswindow "title:^(Picture-in-Picture|Incrustation vidéo)$"'



# --- PiP Corner Snapping ---
bind = $mainMod CTRL, left,  movewindow, l
bind = $mainMod CTRL, right, movewindow, r
bind = $mainMod CTRL, up,    movewindow, u
bind = $mainMod CTRL, down,  movewindow, d
