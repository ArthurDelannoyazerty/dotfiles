active_model = "vllm-mistral-small-4"
textual_theme = "terminal"
vim_keybindings = false
disable_welcome_banner_animation = false
auto_compact_threshold = 100000
context_warnings = false
system_prompt_id = "cli"
include_commit_signature = true
include_model_info = true
include_project_context = true
enable_update_checks = true
api_timeout = 720.0
enabled_tools = []
disabled_tools = []
theme = "nord"

[[providers]]
name = "vllm"
api_base = "http://vllm.model00.operation.acrist-services.com/v1"
api_key_env_var = ""
api_style = "openai"
backend = "generic"
reasoning_field_name = "reasoning_content"

[[providers]]
name = "mistral"
api_base = "https://api.mistral.ai/v1"
api_key_env_var = "MISTRAL_API_KEY"
api_style = "openai"
backend = "mistral"
reasoning_field_name = "reasoning_content"

[[models]]
name = "mistralai/Mistral-Small-4-119B-2603-NVFP4"
provider = "vllm"
alias = "vllm-mistral-small-4"
temperature = 0.2
input_price = 0.0
output_price = 0.0
thinking = "medium"

[project_context]
max_chars = 40000
default_commit_count = 5
max_doc_bytes = 32768
truncation_buffer = 1000
max_depth = 3
max_files = 1000
max_dirs_per_level = 20
timeout_seconds = 2.0

[session_logging]
save_dir = "~/.vibe/logs/session"
session_prefix = "session"
enabled = true

[tools.write_file]
permission = "always"
max_write_bytes = 64000

[tools.bash]
permission = "ask"
max_output_bytes = 16000
default_timeout = 30
allowlist = [
    "cd",
    "git diff",
    "grep",
    "head",
    "mkdir",
    "npm run build",
    "python -m",
    "tail",
]

[tools.grep]
permission = "always"
max_output_bytes = 64000
default_max_matches = 100

[tools.todo]
permission = "always"
max_todos = 100

[tools.read]
permission = "always"
max_read_bytes = 64000

[tools.edit]
permission = "ask"
