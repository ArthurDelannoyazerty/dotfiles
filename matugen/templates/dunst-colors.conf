[urgency_low]
    background = "{{colors.background.default.hex}}"
    foreground = "{{colors.on_background.default.hex}}"
    frame_color = "{{colors.outline_variant.default.hex}}"
    timeout = 4

[urgency_normal]
    background = "{{colors.background.default.hex}}"
    foreground = "{{colors.on_background.default.hex}}"
    frame_color = "{{colors.primary.default.hex}}"
    timeout = 8

[urgency_critical]
    # Hardcoded high-contrast hazard colors so it never blends in with a red theme
    background = "#ff0000"    # Caution Yellow
    foreground = "#000000"    # Dark text
    frame_color = "#fd8700"   # Orange border
    
    # Make the border slightly thicker just for critical alerts
    frame_width = 2
    
    timeout = 0
    
    # Injects a warning icon specifically for critical notifications
    format = "<b>⚠️  %s</b>\n%b"
