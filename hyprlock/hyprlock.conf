# Import Matugen adaptive colors
source = ~/.config/hypr/conf/hyprlock-colors.conf

general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
}

# BACKGROUND (Uses the real image to hide windows, then blurs it)
background {
    monitor =
    path = ~/.cache/current_wallpaper 
    color = $background
    
    # Blur the background
    blur_passes = 3 
    blur_size = 5
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# INPUT FIELD
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2 
    dots_spacing = 0.2 
    dots_center = true
    
    # Adaptive Colors
    outer_color = $primary
    inner_color = $background
    font_color = $text
    
    fade_on_empty = false
    font_family = Iosevka Nerd Font
    placeholder_text = <i>Input Password...</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

# TIME
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $text
    font_size = 120
    font_family = Iosevka Nerd Font ExtraBold
    position = 0, -300
    halign = center
    valign = top
}

# DATE
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%d/%m/%Y")"
    color = $primary
    font_size = 20
    font_family = Iosevka Nerd Font Bold
    position = 0, -500
    halign = center
    valign = top
}